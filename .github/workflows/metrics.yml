name: Metrics
on:
  # Schedule hourly updates
  schedule: [{cron: "0 * * * *"}]
  # (optional) Run workflow manually
  workflow_dispatch:
  # (optional) Run workflow when pushing on master/main
  push: {branches: ["master", "main"]}
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Classic
        uses: lowlighter/metrics@v3.34
        with:
          filename: metrics.classic.svg
          token: ${{ secrets.METRICS_TOKEN }}
          committer_token: ${{ secrets.GITHUB_TOKEN }}

          user: Devaaldo
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Asia/Jakarta

          plugin_traffic: yes
          plugin_gists: yes
          plugin_lines: yes
          plugin_lines_history_limit: 3
          plugin_lines_delay: 30
          plugin_lines_repositories_limit: 10
          plugin_lines_sections: base, repositories

      - name: Full-year calendar
        uses: lowlighter/metrics@v3.34
        with:
          filename: metrics.plugin.isocalendar.fullyear.svg
          token: ${{ secrets.METRICS_TOKEN }}
          committer_token: ${{ secrets.GITHUB_TOKEN }}
          user: Devaaldo
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          config_timezone: Asia/Jakarta

      - name: Most used
        uses: lowlighter/metrics@v3.34
        with:
          filename: metrics.plugin.languages.svg
          token: ${{ secrets.METRICS_TOKEN }}
          committer_token: ${{ secrets.GITHUB_TOKEN }}
          user: Devaaldo
          base: ""
          commits_authoring: Devaaldo, akbarprdn2512@gmail.com, Devaaldo@users.noreply.github.com
          plugin_languages: yes
          plugin_languages_indepth: yes
          plugin_languages_skipped: Devaaldo/Devaaldo
          plugin_languages_ignored: html, css, scss, less
          plugin_languages_limit: 8
          plugin_languages_threshold: 0%
          plugin_languages_colors: github
          plugin_languages_sections: most-used
          plugin_languages_details: percentage
          plugin_languages_analysis_timeout: 60
          plugin_languages_analysis_timeout_repositories: 15
          plugin_languages_categories: programming

      - name: Coding habits
        uses: lowlighter/metrics@v3.34
        with:
          filename: metrics.plugin.habits.svg
          token: ${{ secrets.METRICS_TOKEN }}
          committer_token: ${{ secrets.GITHUB_TOKEN }}
          user: Devaaldo
          base: ""
          plugin_habits: yes
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          plugin_habits_days: 14
          plugin_habits_from: 200
          config_timezone: Asia/Jakarta

      - name: Recently starred repositories
        uses: lowlighter/metrics@v3.34
        with:
          filename: metrics.plugin.stars.svg
          token: ${{ secrets.METRICS_TOKEN }}
          committer_token: ${{ secrets.GITHUB_TOKEN }}
          user: Devaaldo
          base: ""
          plugin_stars: yes
          plugin_stars_limit: 3
          config_timezone: Asia/Jakarta


      - name: LeetCode
        uses: lowlighter/metrics@v3.34
        with:
          filename: metrics.plugin.leetcode.svg
          token: ${{ secrets.METRICS_TOKEN }}
          committer_token: ${{ secrets.GITHUB_TOKEN }}
          user: Devaaldo
          base: ""
          plugin_leetcode: yes
          plugin_leetcode_user: devaaldo
          plugin_leetcode_sections: solved

